name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Permet de lancer la pipeline manuellement depuis l'interface GitHub

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # On change le nom des packages pour forcer GHCR à en créer de nouveaux 
  # et éviter le conflit de droits avec l'ancien repository supprimé.
  API_IMAGE_NAME: darkbd11/api-devops
  DASHBOARD_IMAGE_NAME: darkbd11/dashboard-devops

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          pytest tests/ -v --cov=api --cov-fail-under=75
        env:
          API_KEY: ci-test-key

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    # Ne se lance que sur la branche main
    if: github.ref == 'refs/heads/main'
    
    # Permissions requises pour pousser sur GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE_NAME }}:${{ github.sha }}
